name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1 — Lint & formatage (ruff)
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Installer ruff
        run: pip install ruff>=0.4.0

      - name: Vérifier le formatage
        run: ruff format --check src/ tests/

      - name: Analyser le code
        run: ruff check src/ tests/

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2 — Typage statique (mypy)
  # ─────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Typage (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Installer les dépendances CI
        run: pip install -r requirements-ci.txt

      - name: Vérifier les types
        run: mypy src/common/ src/acquisition/

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3 — Tests unitaires (pytest)
  # Sans hardware : serial et influxdb_client sont mockés dans les tests
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Tests unitaires (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Installer les dépendances CI
        run: pip install -r requirements-ci.txt

      - name: Lancer les tests
        run: pytest tests/ --tb=short -q

      - name: Publier le rapport de couverture (facultatif)
        if: always()
        run: |
          pip install pytest-cov --quiet
          pytest tests/ --cov=src --cov-report=term-missing -q

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4 — Audit de sécurité des dépendances (pip-audit)
  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: Audit sécurité (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer pip-audit
        run: pip install pip-audit>=2.7.0

      - name: Auditer les dépendances CI
        run: pip-audit -r requirements-ci.txt --skip-editable

      - name: Auditer les dépendances production
        run: pip-audit -r requirements.txt --skip-editable
        # Ne bloque pas le pipeline si une vulnérabilité est dans une lib ML optionnelle
        continue-on-error: true
