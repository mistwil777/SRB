serial:
  port: "COM3"              # à adapter selon l'OS (ex: /dev/ttyUSB0 sous Linux)
  baudrate: 9600
  timeout: 2                # secondes
  reconnect_delay_base: 2   # secondes, backoff exponentiel
  reconnect_delay_max: 60

influxdb:
  url: "http://localhost:8086"
  token: ""                 # à renseigner via variable d'environnement INFLUXDB_TOKEN
  org: "SRB"
  bucket: "srb_sensors"

vision:
  model_path: "data/models/yolov8n-seg.pt"
  image_dir: "data/raw/images"
  processed_dir: "data/processed"
  confidence_threshold: 0.5

logging:
  level: "INFO"
  dir: "logs"
  max_bytes: 10485760       # 10 MB
  backup_count: 5

acquisition:
  interval_seconds: 900     # 15 minutes

# Continual learning — features du modèle IA
# Passer une feature de "planned" à "active" suffit à l'activer dans le pipeline
features:
  active:
    - soil_moisture           # Phase 1 — capteur sol capacitatif
    - temp_air                # Phase 1 — DHT22
    - humidity_air            # Phase 1 — DHT22
    - lux                     # Phase 1 — BH1750
  planned:
    - ph                      # Phase 2 — quand le capteur sera branché
    - ec                      # Phase 3 — conductivité électrique
    - npk_n                   # Phase 3 — azote
    - npk_p                   # Phase 3 — phosphore
    - npk_k                   # Phase 3 — potassium
