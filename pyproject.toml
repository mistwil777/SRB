[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501"]  # longueur gérée par line-length

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true   # évite les erreurs sur les libs sans stubs (ultralytics, etc.)
exclude = ["data/", "logs/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
